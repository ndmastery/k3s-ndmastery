apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: web-curricanvas-wrr
  namespace: ndmastery
  labels:
    app.kubernetes.io/name: web-curricanvas
    app.kubernetes.io/part-of: ndmastery
    app.kubernetes.io/managed-by: argo-rollouts
spec:
  weighted:
    sticky:
      cookie:
        name: web-curricanvas-route
        httpOnly: true
        secure: true
        sameSite: lax
    services:
      - name: web-curricanvas-stable
        port: 3002
      - name: web-curricanvas-canary
        port: 3002
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-curricanvas
  namespace: ndmastery
  labels:
    app.kubernetes.io/name: web-curricanvas
    app.kubernetes.io/part-of: ndmastery
    app.kubernetes.io/managed-by: argo-rollouts
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`curricanvas.com`)
      kind: Rule
      services:
        - name: web-curricanvas-wrr
          kind: TraefikService
      middlewares:
        - name: ndmastery-secure-headers
        - name: ndmastery-compress
  tls:
    secretName: web-curricanvas-tls
    options:
      name: ndmastery-modern-tls
      namespace: ndmastery
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: web-curricanvas-tls
  namespace: ndmastery
  labels:
    app.kubernetes.io/name: web-curricanvas
    app.kubernetes.io/part-of: ndmastery
    app.kubernetes.io/managed-by: argo-rollouts
spec:
  secretName: web-curricanvas-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - curricanvas.com
