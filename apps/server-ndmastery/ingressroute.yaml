apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: server-ndmastery-wrr
  namespace: ndmastery
  labels:
    app.kubernetes.io/name: server-ndmastery
    app.kubernetes.io/part-of: ndmastery
    app.kubernetes.io/managed-by: argo-rollouts
spec:
  weighted:
    sticky:
      cookie:
        name: server-ndmastery-route
        httpOnly: true
        secure: true
        sameSite: lax
    services:
      - name: server-ndmastery-stable
        port: 4000
      - name: server-ndmastery-canary
        port: 4000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: server-ndmastery
  namespace: ndmastery
  labels:
    app.kubernetes.io/name: server-ndmastery
    app.kubernetes.io/part-of: ndmastery
    app.kubernetes.io/managed-by: argo-rollouts
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`server.ndmastery.com`)
      kind: Rule
      services:
        - name: server-ndmastery-wrr
          kind: TraefikService
      middlewares:
        - name: ndmastery-secure-headers
        - name: ndmastery-compress
  tls:
    secretName: server-ndmastery-tls
    options:
      name: ndmastery-modern-tls
      namespace: ndmastery
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: server-ndmastery-tls
  namespace: ndmastery
  labels:
    app.kubernetes.io/name: server-ndmastery
    app.kubernetes.io/part-of: ndmastery
    app.kubernetes.io/managed-by: argo-rollouts
spec:
  secretName: server-ndmastery-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - server.ndmastery.com
