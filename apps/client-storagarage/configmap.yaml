apiVersion: v1
kind: ConfigMap
metadata:
  name: client-storagarage-config
  namespace: ndmastery
  labels:
    app.kubernetes.io/name: client-storagarage
    app.kubernetes.io/part-of: ndmastery
    app.kubernetes.io/managed-by: argo-rollouts
data:
  NODE_ENV: "production"
  PORT: "3102"
  HOST: "0.0.0.0"
  PUBLIC_ORIGIN: "https://web.storagarage.com"
  ORIGIN: "https://web.storagarage.com"
  PUBLIC_SITE_URL: "https://web.storagarage.com"
  PUBLIC_STORAGE_URL: "https://s3.storagarage.com"
  PUBLIC_REGISTRY_URL: "https://registry.storagarage.com"
  PUBLIC_STORE_URL: "https://store.storagarage.com"
  PUBLIC_SSM_URL: "https://ssm.storagarage.com"
  PUBLIC_STORAGARAGE_ORIGINS: "https://web.storagarage.com,https://s3.storagarage.com,https://registry.storagarage.com,https://store.storagarage.com,https://ssm.storagarage.com"
  PUBLIC_SSO_URL: "https://sso.ndmastery.com"
  PUBLIC_SSO_CLIENT_ID: "storagarage"
  STORAGARAGE_BACKEND_WS_URL: "ws://server-ndmastery-stable.ndmastery.svc.cluster.local:4000/storagarage"
  SSO_BACKEND_WS_URL: "ws://server-ndmastery-stable.ndmastery.svc.cluster.local:4000/sso"
